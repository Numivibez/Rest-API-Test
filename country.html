<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/country.js" defer></script>
    <!-- favicon -->
    <link rel="icon" type="image/png" href="./Asset/numi.png">
</head>
<body>

    <header class="header-container">
        <div class="header-content">
            <button class="back-btn">← Back</button>
            <button class="dark-mode">🌙 <span class="mode-label">Dark Mode</span></button>
        </div>
    </header>

    <main class="country-page">
        <div class="loader" aria-live="polite" aria-busy="true">
            <div class="spinner" aria-hidden="true"></div>
            <p class="loader-text">Loading country…</p>
        </div>

        <div class="country-details hidden"></div>
    </main>
</body>
</html>
